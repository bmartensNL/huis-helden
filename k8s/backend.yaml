apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: huis-helden
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/bmartensnl/huis-helden-backend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: huis-helden-secrets
            - configMapRef:
                name: huis-helden-config
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: huis-helden
spec:
  selector:
    app: backend
  ports:
    - port: 3000
      targetPort: 3000
